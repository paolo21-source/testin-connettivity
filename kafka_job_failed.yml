- name: Notify Kafka - Job Failure
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Send failure message to Kafka
      shell: |
        python3 -c "
        from kafka import KafkaProducer
        import json
        from datetime import datetime

        producer = KafkaProducer(
          bootstrap_servers='{{ kafka_bootstrap_servers }}',
          security_protocol='SASL_SSL',
          sasl_mechanism='PLAIN',
          sasl_plain_username='{{ kafka_username }}',
          sasl_plain_password='{{ kafka_password }}',
          ssl_cafile='{{ kafka_ssl_cafile }}',
          ssl_check_hostname=False,
          key_serializer=lambda v: json.dumps(v).encode('utf-8'),
          value_serializer=lambda v: json.dumps(v).encode('utf-8')
        )
        key = {
          'providerId': '{{ provider_secret.providerId }}',
          'outcomeType': 'PROVIDER_OPERATION_FAILED',
          'timestamp': datetime.utcnow().strftime('<TIMESTAMP_FORMAT>')
        }

        payload = {
          'requestType': '{{ request_type }}',
          'requestId': '{{ request_id }}',
          'externalId': '{{ external_id }}',
          'error': 'UNEXPECTED_ERROR',
          'errorDetail': '{{ awx_job_explanation }}'
        }

        producer.send('provider-operation-outcomes', key=key, value=payload)
        producer.flush()
        producer.close()
        print('OK')
        "