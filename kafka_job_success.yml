- name: Notify Kafka - Job Success
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Send success message to Kafka
      shell: |
        python3 -c "
        from kafka import KafkaProducer
        import json
        from datetime import datetime

        producer = KafkaProducer(
          bootstrap_servers='172.16.0.174:9093',
          key_serializer=lambda v: json.dumps(v).encode('utf-8'),
          value_serializer=lambda v: json.dumps(v).encode('utf-8')
        )

        key = {
          'providerId': '{{ provider_secret.providerId }}',
          'outcomeType': 'PROVIDER_OPERATION_COMPLETED',
          'timestamp': datetime.utcnow().strftime('<TIMESTAMP_FORMAT>')
        }

        payload = {
          'requestType': '{{ request_type }}',
          'requestId': '{{ request_id }}',
          'externalId': '{{ external_id }}',
          'userEmail': '{{ user_email }}',
          'cloudBlueTemplateId': '{{ activation_template_id }}'
        }

        producer.send('provider-operation-outcomes', key=key, value=payload)
        producer.flush()
        producer.close()
        print('OK')
        "