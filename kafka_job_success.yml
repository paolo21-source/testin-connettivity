- name: Notify Kafka - Job Success
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Send Kafka success notification
      include_role:
        name: kafka_notify
      vars:
        kafka_outcome_type: "PROVIDER_OPERATION_COMPLETED"
        kafka_payload: >-
          {{
            {
              "requestId": request_id,
              "requestType": request_type,
              "externalId": external_id,
              "userEmail": user_email,
              "cloudBlueTemplateId": cloudblue_template_id,
              "requestType": request_type
            } | to_json
          }}